<!DOCTYPE html>
<html>
<head>
  <title>AniList Background</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h2>Set Background Video</h2>

  <!-- Preset dropdown -->
  <label for="preset">Choose preset:</label>
  <select id="preset">
  <option value="">-- Select a preset --</option>
  <option value="https://i.imgur.com/WVXOFcd.mp4">Default (Tokiyuki - The Elusive Samurai)</option>
  </select>

  <p>or paste your own:</p>
  <input type="text" id="videoUrl" placeholder="Paste video URL here">
  <button id="saveBtn">Save</button>

  <script src="popup.js"></script>
</body>
</html>
